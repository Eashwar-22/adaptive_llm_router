services:
  backend:
    build: ./backend
    container_name: llm_gateway_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: llm_gateway_dashboard
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
